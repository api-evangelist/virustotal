      key: x-apikey
      value: '{{env.VIRUSTOTAL_API_KEY}}'
      placement: header
    resources:
    - name: graphs
      path: /graphs
      operations:
      - name: graphs
        method: GET
        description: VirusTotal Search Graphs
        inputParameters:
        - name: filter
          in: query
          type: string
          required: false
          description: Return the graphs matching the given criteria only
        - name: limit
          in: query
          type: integer
          required: false
          description: Maximum number graphs to retrieve
        - name: cursor
          in: query
          type: string
          required: false
          description: Continuation cursor
        - name: order
          in: query
          type: string
          required: false
          description: Sort order
        - name: attributes
          in: query
          type: string
          required: false
          description: Specific fields to retrieve
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createGraphs
        method: POST
        description: VirusTotal Create a Graph
        inputParameters:
        - name: body
          in: body
          type: object
          required: false
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: graphs-id
      path: /graphs/{id}
      operations:
      - name: graphsDelete
        method: DELETE
        description: VirusTotal Delete a Graph
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: A 65 char length id which uniquely identify the graph.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: graphsInfo
        method: GET
        description: VirusTotal Get a Graph Object
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: A 65 char length id which uniquely identify the graph.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: graphsUpdate
        method: PATCH
        description: VirusTotal Update a Graph Object
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: A 65 char length id which uniquely identify the graph.
        - name: body
          in: body
          type: object
          required: false
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: graphs-id-comments
      path: /graphs/{id}/comments
      operations:
      - name: getGraphComments
        method: GET
        description: VirusTotal Get Comments on a Graph
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: A 65 char length id which uniquely identify the graph.
        - name: limit
          in: query
          type: string
          required: false
          description: Maximum number of related objects to retrieve
        - name: cursor
          in: query
          type: integer
          required: false
          description: Continuation cursor
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: postGraphsComments
        method: POST
        description: VirusTotal Add a Comment to a Graph
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: A 65 char length id which uniquely identify the graph.
        - name: body
          in: body
          type: object
          required: false
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: graphs-id-relationships-relationship
      path: /graphs/{id}/relationships/{relationship}
      operations:
      - name: graphsRelationshipsIds
        method: GET
        description: VirusTotal Get Object Descriptors Related to a Graph
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: A 65 char length id which uniquely identify the graph.
        - name: relationship
          in: path
          type: string
          required: true
          description: Relationship name (see [table](ref:graph-object#relationships))
        - name: limit
          in: query
          type: string
          required: false
          description: Maximum number of related objects to retrieve
        - name: cursor
          in: query
          type: integer
          required: false
          description: Continuation cursor
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: graphs-id-relationship
      path: /graphs/{id}/{relationship}
      operations:
      - name: graphsRelationships
        method: GET
        description: VirusTotal Get Objects Related to a Graph
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: A 65 char length id which uniquely identify the graph.
        - name: relationship
          in: path
          type: string
          required: true
          description: Relationship name (see [table](ref:graph-object#relationships))
        - name: limit
          in: query
          type: string
          required: false
          description: Maximum number of related objects to retrieve
        - name: cursor
          in: query
          type: integer
          required: false
          description: Continuation cursor
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.

      - description: String to search with in the hunting notification tags
        in: query
        name: filter
        schema:
          type: string
      - description: Maximum number of notifications counted (meta.count in the response) 10,000 max
        in: query
        name: count_limit
        schema:
          default: 200
          format: int32
          type: integer
      responses:
        '200':
          content:
            application/json:
              examples:
                Result:
                  value: '{}'
              schema:
                properties: {}
                type: object
          description: '200'
        '400':
          content:
            application/json:
              examples:
                Result:
                  value: '{}'
              schema:
                properties: {}
                type: object
          description: '400'
      security:
      - VTApiKey: []
      summary: VirusTotal Retrieve File Objects for Livehunt Notifications
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /intelligence/hunting_notifications:
    delete:
      tags:

naftiko: 1.0.0-alpha2
info:
  label: VirusTotal API v3 - IoC Feeds — IoC Feeds - URL intelligence feed
  description: 'VirusTotal API v3 - IoC Feeds — IoC Feeds - URL intelligence feed. 2 operations. Lead operation: Get an Hourly URL Feed Batch. Self-contained Naftiko capability covering one VirusTotal business
    surface.'
  tags:
  - VirusTotal
  - IoC Feeds
  - URL intelligence feed
  created: '2026-05-29'
  modified: '2026-05-29'
binds:
- namespace: env
  keys:
    VIRUSTOTAL_API_KEY: VIRUSTOTAL_API_KEY
capability:
  consumes:
  - type: http
    namespace: ioc-feeds-ioc-feeds-url-intelligence-feed
    baseUri: https://www.virustotal.com/api/v3
    description: VirusTotal API v3 - IoC Feeds — IoC Feeds - URL intelligence feed. Self-contained, no shared references.
    authentication:
      type: apikey
      key: x-apikey
      value: '{{env.VIRUSTOTAL_API_KEY}}'
      placement: header
    resources:
    - name: feeds-urls-hourly-time
      path: /feeds/urls/hourly/{time}
      operations:
      - name: feedsUrlHourly
        method: GET
        description: VirusTotal Get an Hourly URL Feed Batch
        inputParameters:
        - name: time
          in: path
          type: string
          required: true
          description: A string in format YYYYMMDDhh
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: feeds-urls-time
      path: /feeds/urls/{time}
      operations:
      - name: feedsUrl
        method: GET
        description: VirusTotal Get a Minutely URL Feed Batch
        inputParameters:
        - name: time
          in: path
          type: string
          required: true
          description: A string in format YYYYMMDDhhmm
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: ioc-feeds-ioc-feeds-url-intelligence-feed-rest
    port: 8080
    description: REST adapter for VirusTotal API v3 - IoC Feeds — IoC Feeds - URL intelligence feed. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/feeds/urls/hourly/{time}
      name: feeds-urls-hourly-time
      description: REST surface for /feeds/urls/hourly/{time}.
      operations:
      - method: GET
        name: feedsUrlHourly
        description: VirusTotal Get an Hourly URL Feed Batch
        call: ioc-feeds-ioc-feeds-url-intelligence-feed.feedsUrlHourly
        outputParameters:
        - type: object
          mapping: $.
        with:
          time: rest.time
    - path: /v1/feeds/urls/{time}
      name: feeds-urls-time
      description: REST surface for /feeds/urls/{time}.
      operations:
      - method: GET
        name: feedsUrl
        description: VirusTotal Get a Minutely URL Feed Batch
        call: ioc-feeds-ioc-feeds-url-intelligence-feed.feedsUrl
        outputParameters:
        - type: object
          mapping: $.
        with:
          time: rest.time
  - type: mcp
    namespace: ioc-feeds-ioc-feeds-url-intelligence-feed-mcp
    port: 9090
    transport: http
    description: MCP adapter for VirusTotal API v3 - IoC Feeds — IoC Feeds - URL intelligence feed. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: get-hourly-url-feed-batch
      description: VirusTotal Get an Hourly URL Feed Batch
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ioc-feeds-ioc-feeds-url-intelligence-feed.feedsUrlHourly
      outputParameters:
      - type: object
        mapping: $.
      with:
        time: tools.time
    - name: get-minutely-url-feed-batch
      description: VirusTotal Get a Minutely URL Feed Batch
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ioc-feeds-ioc-feeds-url-intelligence-feed.feedsUrl
      outputParameters:
      - type: object
        mapping: $.
      with:
        time: tools.time

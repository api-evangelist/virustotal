      deprecated: false
      description: 'This endpoint deletes Google Threat Intelligence Hunting Livehunt notifications in bulk. If the `tag` parameter is specified all your notifications with the given tag will be deleted.
        If the `tag` parameter is not specified all your notifications will be deleted.

        '
      operationId: deleteHuntingNotifications
      parameters:

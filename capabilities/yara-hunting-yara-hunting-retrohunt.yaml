        description: VirusTotal Delete a Retrohunt Job
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: Job identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getRetrohuntJob
        method: GET
        description: VirusTotal Get a Retrohunt Job Object
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: Job identifier
        outputRawFormat: json
        outputParameters:
        - name: result

        outputParameters:
        - name: result
          type: object
          value: $.
      - name: graphsCheckViewer
        method: GET
        description: VirusTotal Check if a User or Group Can View a Graph
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: A 65 char length id which uniquely identify the graph.

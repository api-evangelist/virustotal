naftiko: 1.0.0-alpha2
info:
  label: VirusTotal API v3 - IoC Investigation — IoC Investigation - Files
  description: 'VirusTotal API v3 - IoC Investigation — IoC Investigation - Files. 14 operations. Lead operation: Get a URL for Uploading Large Files. Self-contained Naftiko capability covering one VirusTotal
    business surface.'
  tags:
  - VirusTotal
  - IoC Investigation
  - Files
  created: '2026-05-29'
  modified: '2026-05-29'
binds:
- namespace: env
  keys:
    VIRUSTOTAL_API_KEY: VIRUSTOTAL_API_KEY
capability:
  consumes:
  - type: http
    namespace: ioc-investigation-ioc-investigation-files
    baseUri: https://www.virustotal.com/api/v3
    description: VirusTotal API v3 - IoC Investigation — IoC Investigation - Files. Self-contained, no shared references.
    authentication:
      type: apikey
      key: x-apikey
      value: '{{env.VIRUSTOTAL_API_KEY}}'
      placement: header
    resources:
    - name: files-upload-url
      path: /files/upload_url
      operations:
      - name: filesUploadUrl
        method: GET
        description: VirusTotal Get a URL for Uploading Large Files
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: files
      path: /files
      operations:
      - name: filesScan
        method: POST
        description: VirusTotal Upload a File
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: files-id
      path: /files/{id}
      operations:
      - name: fileInfo
        method: GET
        description: VirusTotal Get a File Report
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: SHA-256, SHA-1 or MD5 identifying the file
        - name: x-tool
          in: header
          type: string
          required: false
          description: The name of your tool or service. This is required to obtain the gti_assesment data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: files-id-analyse
      path: /files/{id}/analyse
      operations:
      - name: filesAnalyse
        method: POST
        description: VirusTotal Request a File Rescan (re-analyze)
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: SHA-256, SHA-1 or MD5 identifying the file
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: files-id-comments
      path: /files/{id}/comments
      operations:
      - name: filesCommentsGet
        method: GET
        description: VirusTotal Get Comments on a File
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: SHA-256, SHA-1 or MD5 identifying the file
        - name: limit
          in: query
          type: integer
          required: false
          description: Maximum number of comments to retrieve
        - name: cursor
          in: query
          type: string
          required: false
          description: Continuation cursor
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: filesCommentsPost
        method: POST
        description: VirusTotal Add a Comment to a File
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: SHA-256, SHA-1 or MD5 identifying the file
        - name: body
          in: body
          type: object
          required: false
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: files-id-download
      path: /files/{id}/download
      operations:
      - name: filesDownload
        method: GET
        description: VirusTotal Download a File
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: SHA-256, SHA-1 or MD5 identifying the file
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: files-id-download-url
      path: /files/{id}/download_url
      operations:
      - name: filesDownloadUrl
        method: GET
        description: VirusTotal Get a File’s Download URL
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: SHA-256, SHA-1 or MD5 identifying the file
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: files-id-relationships-relationship
      path: /files/{id}/relationships/{relationship}
      operations:
      - name: filesRelationshipsIds
        method: GET
        description: VirusTotal Get Object Descriptors Related to a File
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: SHA-256, SHA-1 or MD5 identifying the file
        - name: relationship
          in: path
          type: string
          required: true
          description: Relationship name (see [table](ref:object-files#relationships))
        - name: limit
          in: query
          type: string
          required: false
          description: Maximum number of related objects to retrieve
        - name: cursor
          in: query
          type: string
          required: false
          description: Continuation cursor
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: files-id-votes
      path: /files/{id}/votes
      operations:
      - name: filesVotesGet
        method: GET
        description: VirusTotal Get Votes on a File
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: SHA-256, SHA-1 or MD5 identifying the file
        - name: limit
          in: query
          type: integer
          required: false
          description: Maximum number of votes to retrieve
        - name: cursor
          in: query
          type: string
          required: false
          description: Continuation cursor
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: filesVotesPost
        method: POST
        description: VirusTotal Add a Vote on a File
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: SHA-256, SHA-1 or MD5 identifying the file
        - name: body
          in: body
          type: object
          required: false
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: files-id-relationship
      path: /files/{id}/{relationship}
      operations:
      - name: filesRelationships
        method: GET
        description: VirusTotal Get Objects Related to a File
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: SHA-256, SHA-1 or MD5 identifying the file
        - name: relationship
          in: path
          type: string
          required: true
          description: Relationship name (see [table](ref:object-files#relationships))
        - name: limit
          in: query
          type: integer
          required: false
          description: Maximum number of related objects to retrieve
        - name: cursor
          in: query
          type: string
          required: false
          description: Continuation cursor
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: sigma-rules-id
      path: /sigma_rules/{id}
      operations:
      - name: getSigmaRules
        method: GET
        description: VirusTotal Get a Crowdsourced Sigma Rule Object
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: Rule ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: yara-rulesets-id
      path: /yara_rulesets/{id}
      operations:
      - name: getYaraRulesets
        method: GET
        description: VirusTotal Get a Crowdsourced YARA Ruleset
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: Ruleset ID to fetch.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.

          in: path
          type: string
          required: true
          description: User or group ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: graphs-id-relationships-viewers
      path: /graphs/{id}/relationships/viewers
      operations:
      - name: graphsViewers
        method: GET
        description: VirusTotal Get Users and Groups That Can View a Graph
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: A 65 char length id which uniquely identify the graph.
        - name: limit
          in: query
          type: string
          required: false
          description: Maximum number of related objects to retrieve
        - name: cursor
          in: query
          type: integer
          required: false
          description: Continuation cursor
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: graphsAddViewer
        method: POST
        description: VirusTotal Grant Users and Groups Permission to See a Graph
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: A 65 char length id which uniquely identify the graph.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:

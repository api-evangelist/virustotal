naftiko: 1.0.0-alpha2
info:
  label: VirusTotal API v3 - IoC Investigation — IoC Investigation - Comments
  description: 'VirusTotal API v3 - IoC Investigation — IoC Investigation - Comments. 6 operations. Lead operation: Get Latest Comments. Self-contained Naftiko capability covering one VirusTotal business
    surface.'
  tags:
  - VirusTotal
  - IoC Investigation
  - Comments
  created: '2026-05-29'
  modified: '2026-05-29'
binds:
- namespace: env
  keys:
    VIRUSTOTAL_API_KEY: VIRUSTOTAL_API_KEY
capability:
  consumes:
  - type: http
    namespace: ioc-investigation-ioc-investigation-comments
    baseUri: https://www.virustotal.com/api/v3
    description: VirusTotal API v3 - IoC Investigation — IoC Investigation - Comments. Self-contained, no shared references.
    authentication:
      type: apikey
      key: x-apikey
      value: '{{env.VIRUSTOTAL_API_KEY}}'
      placement: header
    resources:
    - name: comments
      path: /comments
      operations:
      - name: getComments
        method: GET
        description: VirusTotal Get Latest Comments
        inputParameters:
        - name: limit
          in: query
          type: integer
          required: false
          description: Number of items to retrieve
        - name: filter
          in: query
          type: string
          required: false
          description: Filter returned elements
        - name: cursor
          in: query
          type: string
          required: false
          description: Continuation cursor
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: comments-id
      path: /comments/{id}
      operations:
      - name: commentIdDelete
        method: DELETE
        description: VirusTotal Delete a Comment
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: Comment ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getComment
        method: GET
        description: VirusTotal Get a Comment Object
        inputParameters:
        - name: relationships
          in: query
          type: string
          required: false
          description: Relationship name (see [table](ref:comment-object#relationships))
        - name: id
          in: path
          type: string
          required: true
          description: Comment ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: comments-id-relationships-relationship
      path: /comments/{id}/relationships/{relationship}
      operations:
      - name: commentsRelationshipsIds
        method: GET
        description: VirusTotal Get Object Descriptors Related to a Comment
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: Comment identifier
        - name: relationship
          in: path
          type: string
          required: true
          description: Relationship name (see [table](ref:comment-object#relationships))
        - name: limit
          in: query
          type: string
          required: false
          description: Maximum number of related objects to retrieve
        - name: cursor
          in: query
          type: string
          required: false
          description: Continuation cursor
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: comments-id-vote
      path: /comments/{id}/vote
      operations:
      - name: voteComment
        method: POST
        description: VirusTotal Add a Vote to a Comment
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: Comment ID
        - name: body
          in: body
          type: object
          required: false
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: comments-id-relationship
      path: /comments/{id}/{relationship}
      operations:
      - name: commentsRelationships
        method: GET
        description: VirusTotal Get Objects Related to a Comment
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: Comment identifier
        - name: relationship
          in: path
          type: string
          required: true
          description: Relationship name (see [table](ref:comment-object#relationships))
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: ioc-investigation-ioc-investigation-comments-rest
    port: 8080
    description: REST adapter for VirusTotal API v3 - IoC Investigation — IoC Investigation - Comments. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/comments
      name: comments
      description: REST surface for /comments.
      operations:
      - method: GET
        name: getComments
        description: VirusTotal Get Latest Comments
        call: ioc-investigation-ioc-investigation-comments.getComments
        outputParameters:
        - type: object
          mapping: $.
        with:
          limit: rest.limit
          filter: rest.filter
          cursor: rest.cursor
    - path: /v1/comments/{id}
      name: comments-id
      description: REST surface for /comments/{id}.
      operations:
      - method: DELETE
        name: commentIdDelete
        description: VirusTotal Delete a Comment
        call: ioc-investigation-ioc-investigation-comments.commentIdDelete
        outputParameters:
        - type: object
          mapping: $.
        with:
          id: rest.id
      - method: GET
        name: getComment
        description: VirusTotal Get a Comment Object
        call: ioc-investigation-ioc-investigation-comments.getComment
        outputParameters:
        - type: object
          mapping: $.
        with:
          relationships: rest.relationships
          id: rest.id
    - path: /v1/comments/{id}/relationships/{relationship}
      name: comments-id-relationships-relationship
      description: REST surface for /comments/{id}/relationships/{relationship}.
      operations:
      - method: GET
        name: commentsRelationshipsIds
        description: VirusTotal Get Object Descriptors Related to a Comment
        call: ioc-investigation-ioc-investigation-comments.commentsRelationshipsIds
        outputParameters:
        - type: object
          mapping: $.
        with:
          id: rest.id
          relationship: rest.relationship
          limit: rest.limit
          cursor: rest.cursor
    - path: /v1/comments/{id}/vote
      name: comments-id-vote
      description: REST surface for /comments/{id}/vote.
      operations:
      - method: POST
        name: voteComment
        description: VirusTotal Add a Vote to a Comment
        call: ioc-investigation-ioc-investigation-comments.voteComment
        outputParameters:
        - type: object
          mapping: $.
        with:
          id: rest.id
          body: rest.body
    - path: /v1/comments/{id}/{relationship}
      name: comments-id-relationship
      description: REST surface for /comments/{id}/{relationship}.
      operations:
      - method: GET
        name: commentsRelationships
        description: VirusTotal Get Objects Related to a Comment
        call: ioc-investigation-ioc-investigation-comments.commentsRelationships
        outputParameters:
        - type: object
          mapping: $.
        with:
          id: rest.id
          relationship: rest.relationship
  - type: mcp
    namespace: ioc-investigation-ioc-investigation-comments-mcp
    port: 9090
    transport: http
    description: MCP adapter for VirusTotal API v3 - IoC Investigation — IoC Investigation - Comments. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: get-latest-comments
      description: VirusTotal Get Latest Comments
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ioc-investigation-ioc-investigation-comments.getComments
      outputParameters:
      - type: object
        mapping: $.
      with:
        limit: tools.limit
        filter: tools.filter
        cursor: tools.cursor
    - name: delete-comment
      description: VirusTotal Delete a Comment
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: ioc-investigation-ioc-investigation-comments.commentIdDelete
      outputParameters:
      - type: object
        mapping: $.
      with:
        id: tools.id
    - name: get-comment-object
      description: VirusTotal Get a Comment Object
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ioc-investigation-ioc-investigation-comments.getComment
      outputParameters:
      - type: object
        mapping: $.
      with:
        relationships: tools.relationships
        id: tools.id
    - name: get-object-descriptors-related-comment
      description: VirusTotal Get Object Descriptors Related to a Comment
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ioc-investigation-ioc-investigation-comments.commentsRelationshipsIds
      outputParameters:
      - type: object
        mapping: $.
      with:
        id: tools.id
        relationship: tools.relationship
        limit: tools.limit
        cursor: tools.cursor
    - name: add-vote-comment
      description: VirusTotal Add a Vote to a Comment
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: ioc-investigation-ioc-investigation-comments.voteComment
      outputParameters:
      - type: object
        mapping: $.
      with:
        id: tools.id
        body: tools.body
    - name: get-objects-related-comment
      description: VirusTotal Get Objects Related to a Comment
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ioc-investigation-ioc-investigation-comments.commentsRelationships
      outputParameters:
      - type: object
        mapping: $.
      with:
        id: tools.id
        relationship: tools.relationship

                    \ 72 74  \x1Corld\x1D'. */.export\",\n    \"02C643E0: 28 68 65 6C 6C 6F 2C 20  27 77 6F 72 6C 64 27 29  (hello, 'world')\\n02C643F0: 3B 0A 20 2A 20 27 \x1C68 65  6C 6C 6F 20 77 6F 72\
                    \ 6C\x1D  ;. * '\x1Chello worl\x1D\\n02C64400: \x1C64 \x1D27 0A 20 2A 2F 0A 76  61 72 20 6C 6F 67 20 3D  \x1Cd\x1D'. */.var log =\"\n  ]\n}"
          description: '200'

      path: /intelligence/zip_files
      operations:
      - name: zipFiles
        method: POST
        description: VirusTotal Create a Password-protected ZIP with Google Threat Intelligence Files
        inputParameters:
        - name: body
          in: body
          type: object
          required: false
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.

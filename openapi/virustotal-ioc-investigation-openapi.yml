  /intelligence/search:
    get:
      tags:
      - IoC Investigation - Search & Metadata
      deprecated: false
      description: "> \U0001F6A7 Searches using a fuzzy hash (ssdeep, TLSH, ...) are throttled due to performance reasons. The typical throttler is 15 searches / minute.\n\nThis endpoint allows to search\
        \ for files in the Google Threat Intelligence's dataset, using the same query syntax that you would use in the Google TI user interface. **URL Safe encoding must be used when using this endpoint\
        \ programatically.**\n\nThe result from this endpoint is a collection of file objects that match the given query. If the `descriptors_only` parameter is set to `true`, the resulting collection will\
        \ contain only the object descriptors. This is useful if you are interested in getting only the SHA-256 of the matching files. In those cases you better set `descriptors_only=true` for reducing\
        \ the latency of your requests.\n\n> \U0001F6A7 Content searches can not be sorted\n> \n> If your query contains content search the order parameter will make no effect.\n\nThe `order` parameter\
        \ defines the order in which results are returned. They can be followed by a plus (`+`) or minus (`-`) sign for indicating ascending or descending order respectively (i.e: `<order>+`, `<order>-`).\
        \ If no ascending/descending order is specified it's assumed to be ascending, so `<order>` and `<order>+` are equivalent. If the `order` parameter is not provided, items are returned in a default\
        \ order. The following table shows supported and default orders for every kind of entity:\n\n| Entity type | Supported orders                                                                | Default\
        \ order           |\n| :---------- | :------------------------------------------------------------------------------ | :---------------------- |\n| file        | first_submission_date, last_submission_date,\
        \ positives, times_submitted, size   | last_submission_date-   |\n| url         | first_submission_date, last_submission_date, positives, times_submitted, status | last_submission_date-   |\n| domain\
        \      | creation_date, last_modification_date, last_update_date, positives              | last_modification_date- |\n| ip          | ip, last_modification_date, positives                      \
        \                     | last_modification_date- |\n\nThis request returns a list of API objects ([files](https://gtidocs.virustotal.com/reference/files), [URLs](https://gtidocs.virustotal.com/reference/url-object),\
        \ [IP addresses](https://gtidocs.virustotal.com/reference/ip-object) or [domains](https://gtidocs.virustotal.com/reference/domains-object)).\n\nAlso, some context attributes are added in certain\
        \ searches:\n\n- When searching files by `content`. These context attributes are:\n  - `confidence`: \\<_float_>  match confidence.\n  - `match_in_subfile`: \\<_boolean_> whether the content match\
        \ was found in a [subfile](https://gtidocs.virustotal.com/reference/files-bundled_files) or not.\n  - `snippet`: \\<_string_> snippet ID. This ID can be later used in `/intelligence/search/snippets/{id}`\
        \ endpoint.\n\n- When doing a hash similarity search:\n  - `similarity_score`: \\<_float_> number between 0 and 1 indicating the percentage of the fuzzy hash that matched. For example, `1.0` indicates\
        \ the hash is the same as the specified; `0.5` that half of the hash matches the one given.\n\n```json Example response (search by file content)\n{\n  \"data\": [\n    {\n      \"context_attributes\"\
        : {\n        \"confidence\": 1,\n        \"match_in_subfile\": false,\n        \"snippet\": \"L3Z0c2FtcGxlcy8zODIzMzkzNjNhOTM2NDM2ZDM2MDM1MzFkM2IzOGEzMmUzMTUzNzM3MTM4MzY3MzBlM2Q2MzQ4MzY1M2MzYzNhfHw3MTg1Mzk2OjExfHwxNTk5NDY0OTQ3fHwzODIzMzkzNjNhOTM2NDM2ZDM2MDM1MzFkM2IzOGEzMmUzMTUzNzM3MTM4MzY3MzBlM2Q2MzQ4MzY1M2MzYzNh\"\
        \n      },\n      \"id\": \"382339363a936436d3603531d3b38a32e315373713836730e3d63483653c3c3a\",\n      \"type\": \"file\"\n    }\n  ],\n  \"links\": {\n    \"next\": \"https://www.virustotal.com/api/v3/intelligence/search?cursor=H4sI...A&query=content%3A+%22hello+world%22&limit=1&descriptors_only=true\"\
        ,\n    \"self\": \"https://www.virustotal.com/api/v3/intelligence/search?query=content%3A%20%22hello%20world%22&descriptors_only=true&limit=1\"\n  },\n  \"meta\": {\n    \"cursor\": \"H4sIAAA...\"\
        ,\n    \"days_back\": 365\n  }\n}\n```\n"
      operationId: intelligenceSearch
      parameters:
      - description: Search query using URL Safe encoding
        in: query
        name: query
        required: true
        schema:
          type: string
      - description: Sort order (see table in the description above)
        in: query
        name: order
        schema:
          type: string
      - description: Maximum number of results per page (Max. 300)
        in: query
        name: limit
        schema:
          default: 10
          format: int32
          type: integer
      - description: Continuation cursor
        in: query
        name: cursor
        schema:
          type: string
      - description: Whether to return full object information or just object descriptors.
        in: query
        name: descriptors_only
        schema:
          default: false
          type: boolean
      responses:
        '200':
          content:
            application/json:
              examples:
                Result:
                  value: '{}'
              schema:
                properties: {}
                type: object
          description: '200'
        '400':
          content:
            application/json:
              examples:
                Result:
                  value: '{}'
              schema:
                properties: {}
                type: object
          description: '400'
      security:
      - VTApiKey: []
      summary: VirusTotal Advanced Corpus Search
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK

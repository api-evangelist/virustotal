        \ TI) Enterprise or Enterprise Plus licenses.\n\nReturns a list of MITRE tactics with their correspondent techniques that are associated with the [Threat Actor](https://gtidocs.virustotal.com/reference/threat-actor-object),\
        \ [Campaign](https://gtidocs.virustotal.com/reference/campaign-object),[Malware family](https://gtidocs.virustotal.com/reference/malware-family-object), [Software or Toolkit](https://gtidocs.virustotal.com/reference/software-toolkit-object),\
        \ [IoC Collection](https://gtidocs.virustotal.com/reference/ioc-collection-object), [Report](https://gtidocs.virustotal.com/reference/report-object) or [Vulnerability](https://gtidocs.virustotal.com/reference/vulnerability-object)\
        \ as follows:\n\n```json\n{\n    \"data\":\n    {\n        \"tactics\": \\<_list of dictionaries_> the list of associated tactics.\n        [\n            \"id\": \\<_string_> the MITRE tactic identifier.\n\
        \            \"name\": \\<_string_> the name of the tactic.\n            \"link\": \\<_string_> the link to the tactic's MITRE webpage.\n            \"description\": \\<_string_> the description\
        \ of the tactic.\n            \"techniques\": \\<_list of dictionaries_> the list of associated techniques that belong to the tactic and are associated with the threat object.\n                [\n\
        \                    {\n                        \"id\": \\<_string_> the MITRE technique identifier.\n                        \"name\": \\<_string_> the name of the technique.\n                \
        \        \"link\": \\<_string_> the link to the technique's MITRE webpage.\n                        \"description\": \\<_string_> the description of the technique.\n                        \"source\"\
        : \\<_list of strings_> whether the technique association comes from the IoCs related to the threat object (seen_in_iocs) or is intrinsic to it (operational).\n                        \"context_attribute\"\
        : \\<_dictionary_> the date when the technique was associated with the threat object.\n                        {\n                            \"timestamp\": \\<_integer_> (UTC timestamp).\n    \
        \                    }\n                    }\n                ]\n        ]\n    }\n}\n```\n\n## Example response\n\n```json\n{\n    \"data\":\n    {\n        \"tactics\":\n        [\n         \
        \   \"id\": \"TA0005\",\n                \"name\": \"Defense Evasion\",\n                \"link\": \"https://attack.mitre.org/tactics/TA0005/\",\n                \"description\": \"The adversary\
        \ is trying to avoid being detected.\\n\\nDefense Evasion consists of techniques that adversaries use to avoid detection throughout their compromise. Techniques used for defense evasion include\
        \ uninstalling/disabling security software or obfuscating/encrypting data and scripts. Adversaries also leverage and abuse trusted processes to hide and masquerade their malware. Other tactics’\
        \ techniques are cross-listed here when those techniques include the added benefit of subverting defenses. \",\n                \"techniques\":\n                [\n                    {\n      \
        \                  \"id\": \"T1564\",\n                        \"name\": \"Hide Artifacts\",\n                        \"link\": \"https://attack.mitre.org/techniques/T1564/\",\n                \
        \        \"description\": \"Adversaries may attempt to hide artifacts associated with their behaviors to evade detection. Operating systems may have features to hide various artifacts, such as important\
        \ system files and administrative task execution, to avoid disrupting user work environments and prevent users from changing files or features on the system. Adversaries may abuse these features\
        \ to hide artifacts such as files, directories, user accounts, or other system activity to evade detection.\\nAdversaries may also attempt to hide artifacts associated with malicious behavior by\
        \ creating computing regions that are isolated from common security instrumentation, such as through the use of virtualization technology.\",\n                        \"source\":\n             \
        \           [\n                            \"operational\"\n                        ],\n                        \"context_attribute\":\n                        {\n                            \"\
        timestamp\": 1732728093\n                        }\n                    }\n                ]\n        ]\n    }\n}\n```\n\n\n## Examples\n\nGet the MITRE tree associated with a threat actor.\n\n\
        ```python\nimport requests\nimport urllib\n\nobject_id = \"threat-actor--bcaaad6f-0597-4b89-b69b-84a6be2b7bc3\"\nurl = f\"https://www.virustotal.com/api/v3/collections/{object_id}/mitre_tree\"\n\

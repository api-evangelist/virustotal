naftiko: 1.0.0-alpha2
info:
  label: VirusTotal API v3 - IoC Investigation — IoC Investigation - URLs
  description: 'VirusTotal API v3 - IoC Investigation — IoC Investigation - URLs. 9 operations. Lead operation: Scan URL. Self-contained Naftiko capability covering one VirusTotal business surface.'
  tags:
  - VirusTotal
  - IoC Investigation
  - URLs
  created: '2026-05-29'
  modified: '2026-05-29'
binds:
- namespace: env
  keys:
    VIRUSTOTAL_API_KEY: VIRUSTOTAL_API_KEY
capability:
  consumes:
  - type: http
    namespace: ioc-investigation-ioc-investigation-urls
    baseUri: https://www.virustotal.com/api/v3
    description: VirusTotal API v3 - IoC Investigation — IoC Investigation - URLs. Self-contained, no shared references.
    authentication:
      type: apikey
      key: x-apikey
      value: '{{env.VIRUSTOTAL_API_KEY}}'
      placement: header
    resources:
    - name: urls
      path: /urls
      operations:
      - name: scanUrl
        method: POST
        description: VirusTotal Scan URL
        inputParameters:
        - name: body
          in: body
          type: object
          required: false
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: urls-id
      path: /urls/{id}
      operations:
      - name: urlInfo
        method: GET
        description: VirusTotal Get a URL Report
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: URL identifier or base64 representation of URL to scan (w/o padding)
        - name: x-tool
          in: header
          type: string
          required: false
          description: The name of your tool or service. This is required to obtain the gti_assesment data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: urls-id-analyse
      path: /urls/{id}/analyse
      operations:
      - name: urlsAnalyse
        method: POST
        description: VirusTotal Request a URL Rescan (re-analyze)
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: URL identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: urls-id-comments
      path: /urls/{id}/comments
      operations:
      - name: urlsCommentsGet
        method: GET
        description: VirusTotal Get Comments on a URL
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: URL identifier
        - name: limit
          in: query
          type: integer
          required: false
          description: Maximum number of comments to retrieve
        - name: cursor
          in: query
          type: string
          required: false
          description: Continuation cursor
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: urlsCommentsPost
        method: POST
        description: VirusTotal Add a Comment on a URL
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: URL identifier
        - name: body
          in: body
          type: object
          required: false
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: urls-id-relationships-relationship
      path: /urls/{id}/relationships/{relationship}
      operations:
      - name: urlsRelationshipsIds
        method: GET
        description: VirusTotal Get Object Descriptors Related to a URL
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: URL ID
        - name: relationship
          in: path
          type: string
          required: true
          description: Relationship name (see [table](ref:url-object#relationships))
        - name: limit
          in: query
          type: string
          required: false
          description: Maximum number of related objects to retrieve
        - name: cursor
          in: query
          type: string
          required: false
          description: Continuation cursor
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: urls-id-votes
      path: /urls/{id}/votes
      operations:
      - name: urlsVotesGet
        method: GET
        description: VirusTotal Get Votes on a URL
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: URL identifier
        - name: limit
          in: query
          type: integer
          required: false
          description: Maximum number of votes to retrieve
        - name: cursor
          in: query
          type: string
          required: false
          description: Continuation cursor
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: urlsVotesPost
        method: POST
        description: VirusTotal Add a Vote on a URL
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: URL identifier
        - name: body
          in: body
          type: object
          required: false
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: urls-id-relationship
      path: /urls/{id}/{relationship}
      operations:
      - name: urlsRelationships
        method: GET
        description: VirusTotal Get Objects Related to a URL
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: URL identifier
        - name: relationship
          in: path
          type: string
          required: true
          description: Relationship name (see [table](ref:url-object#relationships))
        - name: limit
          in: query
          type: integer
          required: false
          description: Maximum number of related objects to retrieve
        - name: cursor
          in: query
          type: string
          required: false
          description: Continuation cursor
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.

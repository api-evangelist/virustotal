openapi: 3.0.3
info:
  title: VirusTotal API v3 - IoC Feeds
  version: '3.0'
  description: Per-minute and hourly intelligence feed batches for files, URLs, domains, IP addresses, and sandbox analyses. Premium tier required.
  contact:
    name: VirusTotal / Google Threat Intelligence
    url: https://docs.virustotal.com/reference/overview
  license:
    name: VirusTotal Terms of Service
    url: https://www.virustotal.com/gui/terms-of-service
  x-generated-from: https://storage.googleapis.com/gtidocresources/guides/GTI_API_v3_openapi_spec_10022025.json
  x-last-validated: '2026-05-29'
servers:
- url: https://www.virustotal.com/api/v3
  description: VirusTotal / GTI API v3 production.
security:
- VTApiKey: []
tags:
- name: IoC Feeds - Domain intelligence feed
  description: IoC Feeds - Domain intelligence feed
- name: IoC Feeds - File intelligence feed
  description: IoC Feeds - File intelligence feed
- name: IoC Feeds - IP intelligence feed
  description: IoC Feeds - IP intelligence feed
- name: IoC Feeds - Sandbox analyses feed
  description: IoC Feeds - Sandbox analyses feed
- name: IoC Feeds - URL intelligence feed
